name: CI

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --trust-lockfile

      - name: Check
        run: pnpm check

      - name: Package smoke test
        run: |
          test -f dist/index.js
          test -f dist/index.d.ts
          node --input-type=module -e "import('./dist/index.js').then((m) => { if (!m.Markdown || !m.renderMarkdownToStaticMarkup) process.exit(1) })"
