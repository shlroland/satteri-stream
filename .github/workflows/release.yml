name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Release Please
        id: release-please
        uses: googleapis/release-please-action@v5
        with:
          release-type: node
          package-name: satteri-stream
    outputs:
      release_created: ${{ steps.release-please.outputs.release_created }}

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - version
    if: ${{ needs.version.outputs.release_created == 'true' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --trust-lockfile

      - name: Check
        run: pnpm check

      - name: Publish to npm
        run: pnpm publish
